name: Daily Auto Commit

permissions:
  contents: write

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update file - 23f2005050@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date)" >> daily_log.txt

      - name: Commit Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Daily automated commit" || echo "No changes"
          git push
